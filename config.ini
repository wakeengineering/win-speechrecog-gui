[SPEECH_RECOGNITION]
# Model size: tiny, base, or large
# tiny: fastest (~100MB), worst accuracy
# base: balanced (~200MB), good accuracy
# large: best accuracy (~1.8GB), slightly slower
model_size=large

# Voice Activity Detection (VAD) sensitivity
# 0=most aggressive (fewer false positives, may miss quiet speech)
# 1=medium
# 2=least aggressive (more false positives, catches all speech)
# 3=very lenient (catches everything, including background noise)
vad_aggressiveness=2

# Enable/disable VAD
enable_vad=true

[AUDIO]
# Sample rate for recording (16000 is standard, 48000 for higher quality)
sample_rate=16000

# Audio chunk size in samples (larger = more latency, better processing)
# 16000 = 1 second, 4000 = 0.25 seconds
chunk_size=8000

# Enable audio normalization (helps with varying microphone levels)
enable_normalization=true

# Audio normalization target level (0.0-1.0, lower = quieter normalized audio)
normalization_target=0.9

[UI]
# Window opacity (0.0-1.0, where 1.0 is fully opaque)
# Note: Lower values make the entire window (including text) more transparent
# For opaque text on transparent background, increase this to 0.7-1.0
window_opacity=0.75

# Overlay window dimensions
window_width=800
window_height=100

# Caption display duration in milliseconds (how long to show partial results)
caption_display_duration=2000

# Font size for captions
font_size=15

# Font family: mono_sans_serif, small_caps, proportional_sans_serif
font_family=mono_sans_serif

# Background and text colors (hex format)
bg_color=#000000
text_color=#FFFFFF

# Text effects
text_outline=false
outline_color=#000000
text_shadow=false
shadow_color=#000000

# Maximum number of caption lines to display (1-5)
max_caption_lines=2

# Enable debug output to console
debug_output=false

# Clear captions after idle time in seconds (0 = never clear)
idle_timeout_seconds=20

# Use transparent background (text only, no box)
# true = floating text on transparent background
# false = text on semi-transparent black box
transparent_background=true

# Color to use as transparent (when transparent_background=true)
# Use a color that won't appear in your text (e.g., bright magenta #0f0f0f)
transparent_color=#0f0f0f

# Show status bar at bottom (displays connection status)
show_status_bar=false

# Auto-select Stereo Mix if available
auto_select_stereo_mix=false

[DEBUG]
# Enable debug output to console
debug_mode=false

# Print audio levels and VAD activity
print_audio_levels=true

[RIVA]
# Riva server endpoint (default local)
endpoint=localhost:50051

# Use SSL (true/false)
use_ssl=false

# Language code
language_code=en-US

[WINDOWS]
# Window opacity (0.0-1.0, where 1.0 is fully opaque)
# Note: Lower values make the entire window (including text) more transparent
# For opaque text on transparent background, increase this to 0.7-1.0
window_opacity=0.75

# Windows Live Captions scraper settings
# Update interval in milliseconds (how often to check for new captions)
update_interval_ms=50

# Overlay window dimensions
window_width=800
window_height=90

# Font family: mono_sans_serif, small_caps, proportional_sans_serif
font_family=mono_sans_serif

# Font size for captions
font_size=15

# Maximum number of caption lines to display (1-5)
max_caption_lines=1

# Background and text colors (hex format)
bg_color=#000000
text_color=#FFFFFF

# Text effects
# Enable text outline (creates a border around text for better visibility)
text_outline=false
outline_color=#000000

# Enable drop shadow (adds depth to text)
text_shadow=false
shadow_color=#000000

# Hide the original Live Captions window (true/false)
hide_live_captions=true

# Use transparent background (text only, no box)
# true = floating text on transparent background
# false = text on semi-transparent black box
transparent_background=true

# Color to use as transparent (when transparent_background=true)
# Use a color that won't appear in your text (e.g., bright magenta #0f0f0f)
transparent_color=#0f0f0f

# Enable debug output to console (true/false)
debug_output=false
# Clear captions after idle time in seconds (0 = never clear, 5-30 recommended)
idle_timeout_seconds=30

# Show status bar at bottom (displays connection status)
show_status_bar=false